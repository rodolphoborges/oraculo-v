<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oráculo V // Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: #0a0a0a;
            --surface-hover: #111111;
            --accent: #ff4655;
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); font-size: 14px; height: 100vh; display: flex; overflow: hidden; }

        /* Navigation Sidebar */
        nav {
            width: 240px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            background: var(--bg);
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo span { color: var(--accent); }

        .nav-items { flex: 1; }
        .nav-btn {
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 0.25rem;
            transition: all 0.2s;
            font-weight: 500;
        }
        .nav-btn:hover { background: var(--surface-hover); color: var(--text-main); }
        .nav-btn.active { background: var(--surface); color: var(--accent); }

        /* Main Workspace */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        header {
            height: 64px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            justify-content: space-between;
        }

        .view-content { flex: 1; overflow-y: auto; padding: 2rem; }

        /* Tab Content Control */
        .tab-view { display: none; }
        .tab-view.active { display: block; }

        /* Dashboard Styles */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem; border-radius: 12px; }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 0.5rem; }
        .stat-val { font-size: 1.5rem; font-weight: 600; }

        /* Table Styles (Minimalist) */
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; color: var(--text-dim); font-weight: 500; padding: 1rem; border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover td { background: var(--surface-hover); }

        .status-pill {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .status-completed { color: var(--success); background: rgba(0, 255, 136, 0.1); }
        .status-processing { color: #ebff00; background: rgba(235, 255, 0, 0.1); }
        .status-failed { color: var(--accent); background: rgba(255, 70, 85, 0.1); }

        /* Agent Card Grid */
        .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .agent-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .agent-card:hover { transform: translateY(-4px); border-color: var(--accent); background: var(--surface-hover); }

        /* Report Overlay */
        #report-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
            z-index: 100; display: none; padding: 4rem 2rem; overflow-y: auto;
        }
        .report-panel {
            max-width: 800px; margin: 0 auto; background: var(--surface);
            border: 1px solid var(--border); border-radius: 24px; padding: 3rem;
            position: relative;
        }
        .close-btn { position: absolute; top: 1.5rem; right: 1.5rem; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; }

        /* Utils */
        .dim { color: var(--text-dim); }
        .accent { color: var(--accent); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">ORÁCULO <span>V</span></div>
        <div class="nav-items">
            <button class="nav-btn active" onclick="switchTab('dashboard')">Dashboard</button>
            <button class="nav-btn" onclick="switchTab('agents')">Agentes</button>
        </div>
        <div class="dim" style="font-size: 0.7rem;">v4.0.2 // PURE_CONSUMER</div>
    </nav>

    <main>
        <header>
            <div id="breadcrumb" class="dim">Global / <span id="current-view" style="color: white">Dashboard</span></div>
            <div id="live-indicator" class="dim" style="font-size: 0.7rem; display: flex; align-items: center; gap: 0.5rem;">
                <span style="width: 8px; height: 8px; background: var(--success); border-radius: 50%; display: inline-block;"></span>
                SISTEMA OPERACIONAL
            </div>
        </header>

        <div class="view-content">
            <!-- TAB: DASHBOARD -->
            <div id="view-dashboard" class="tab-view active">
                <div class="stats-row" id="dash-stats">
                    <!-- JS -->
                </div>
                <h3>Operações Recentes</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Partida (ID)</th>
                            <th>Agente</th>
                            <th>Status</th>
                            <th>Início</th>
                            <th>Duração</th>
                        </tr>
                    </thead>
                    <tbody id="ops-table-body">
                        <!-- JS -->
                    </tbody>
                </table>
            </div>

            <!-- TAB: AGENTS -->
            <div id="view-agents" class="tab-view">
                <div class="agent-grid" id="agent-grid">
                    <!-- JS -->
                </div>
            </div>

            <!-- TAB: AGENT MATCHES (Detail) -->
            <div id="view-player-detail" class="tab-view">
                <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem;">
                    <button class="nav-btn" style="width: auto;" onclick="switchTab('agents')">← Voltar</button>
                    <h2 id="player-title">Nick#Tag</h2>
                </div>
                <div class="agent-grid" id="player-matches-grid">
                    <!-- JS -->
                </div>
            </div>
        </div>
    </main>

    <div id="report-overlay" onclick="if(event.target === this) closeReport()">
        <div class="report-panel" id="report-panel">
            <div class="close-btn" onclick="closeReport()">&times;</div>
            <div id="report-inner-content"></div>
        </div>
    </div>

    <script src="data.js?v=4.0.2"></script>
    <script src="portal.js?v=4.0.2"></script>
</body>
</html>
