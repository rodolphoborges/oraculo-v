name: Oráculo V Worker

on:
  schedule:
    - cron: '0 * * * *' # Roda a cada hora
  workflow_dispatch: # Permite rodar manualmente

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Versão estável com fetch nativo
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Puppeteer Browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Install Node Dependencies
        run: npm install

      - name: Run Match Discovery
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROTOCOL_SUPABASE_URL: ${{ secrets.PROTOCOL_SUPABASE_URL }}
          PROTOCOL_SUPABASE_KEY: ${{ secrets.PROTOCOL_SUPABASE_KEY }}
          HENRIK_API_KEY: ${{ secrets.HENRIK_API_KEY }}
        run: node discover_matches.js

      - name: Process Queue (Analyze Match)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PROTOCOL_SUPABASE_URL: ${{ secrets.PROTOCOL_SUPABASE_URL }}
          PROTOCOL_SUPABASE_KEY: ${{ secrets.PROTOCOL_SUPABASE_KEY }}
          HENRIK_API_KEY: ${{ secrets.HENRIK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node worker.js
