name: ORÁCULO V - Sincronização Semanal
on:
  schedule:
    - cron: '0 0 * * 1' # Toda segunda-feira às 00:00 UTC
  workflow_dispatch: # Permite que você inicie manualmente para testes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Dependencies
        run: npm install
      - name: Execute Scraper Exaustivo
        run: node scrapers/main.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
